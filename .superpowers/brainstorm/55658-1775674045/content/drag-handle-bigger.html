<h2>Grip Dots — Size Comparison</h2>
<p class="subtitle">Same ⠿ icon at increasing sizes. All absolutely positioned, no text shift.</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>12px</h3>
      <div style="background: #181825; border-radius: 6px; padding: 4px 0; margin-top: 8px;">
        <div style="padding: 10px 12px; background: #1e1e2e; color: #cdd6f4; font-size: 12px; font-family: -apple-system, sans-serif; position: relative;">
          <span style="position: absolute; left: 2px; top: 50%; transform: translateY(-50%); color: #7f849c; font-size: 12px; cursor: grab; line-height: 1;">⠿</span>
          my-project
          <span style="float: right; color: #585b70; font-size: 14px;">×</span>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>14px</h3>
      <div style="background: #181825; border-radius: 6px; padding: 4px 0; margin-top: 8px;">
        <div style="padding: 10px 12px; background: #1e1e2e; color: #cdd6f4; font-size: 12px; font-family: -apple-system, sans-serif; position: relative;">
          <span style="position: absolute; left: 1px; top: 50%; transform: translateY(-50%); color: #7f849c; font-size: 14px; cursor: grab; line-height: 1;">⠿</span>
          my-project
          <span style="float: right; color: #585b70; font-size: 14px;">×</span>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>16px</h3>
      <div style="background: #181825; border-radius: 6px; padding: 4px 0; margin-top: 8px;">
        <div style="padding: 10px 12px; background: #1e1e2e; color: #cdd6f4; font-size: 12px; font-family: -apple-system, sans-serif; position: relative;">
          <span style="position: absolute; left: 0px; top: 50%; transform: translateY(-50%); color: #7f849c; font-size: 16px; cursor: grab; line-height: 1;">⠿</span>
          my-project
          <span style="float: right; color: #585b70; font-size: 14px;">×</span>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>14px + brighter (--overlay1)</h3>
      <div style="background: #181825; border-radius: 6px; padding: 4px 0; margin-top: 8px;">
        <div style="padding: 10px 12px; background: #1e1e2e; color: #cdd6f4; font-size: 12px; font-family: -apple-system, sans-serif; position: relative;">
          <span style="position: absolute; left: 1px; top: 50%; transform: translateY(-50%); color: #9399b2; font-size: 14px; cursor: grab; line-height: 1;">⠿</span>
          my-project
          <span style="float: right; color: #585b70; font-size: 14px;">×</span>
        </div>
      </div>
    </div>
  </div>
</div>
