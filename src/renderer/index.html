<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:">
  <link rel="stylesheet" href="xterm.css">
  <link rel="stylesheet" href="styles.css">
  <title>Claude Code Desktop</title>
</head>
<body>
  <div id="topbar">
    <span id="topbar-path"></span>
    <button id="topbar-new-tab" title="New Tab (Cmd+T)">+</button>
  </div>
  <div id="app">
    <aside id="sidebar">
      <div id="tab-list"></div>
      <button id="new-tab-btn" title="New Tab (Cmd+T)">+</button>
    </aside>
    <div id="sidebar-resize-handle"></div>
    <main id="terminal-container"></main>
    <div id="follow-indicator" class="following">Following &#x2193;</div>
    <div id="empty-state" class="hidden">
      <div class="empty-state-content">
        <h2>Claude Code Desktop</h2>
        <p>Pick a workspace to get started</p>
        <button id="empty-state-open-btn">Open Workspace</button>
        <span class="empty-state-hint">Cmd+T</span>
      </div>
    </div>
  </div>

  <div id="picker-overlay" class="hidden">
    <div id="picker-modal">
      <input id="picker-search" type="text" placeholder="Search workspace..." autocomplete="off" spellcheck="false">
      <ul id="picker-list"></ul>
    </div>
  </div>

  <div id="settings-overlay" class="hidden">
    <div id="settings-modal">
      <div id="settings-header">
        <span>Settings</span>
        <button id="settings-close">&times;</button>
      </div>
      <div id="settings-body">
        <div class="settings-group">
          <label class="settings-label">Workspace Directory</label>
          <p class="settings-hint">Directory to scan for project folders in the workspace picker</p>
          <div class="settings-row">
            <input id="settings-workspace-dir" type="text" spellcheck="false" autocomplete="off">
            <button id="settings-browse-btn">Browse</button>
          </div>
        </div>
        <div class="settings-group">
          <label class="settings-label">Status Detection Hooks</label>
          <p class="settings-hint">Where to configure Claude Code hooks for tab status indicators</p>
          <div class="settings-toggle">
            <button id="settings-hooks-project" class="settings-toggle-btn active">Per Project</button>
            <button id="settings-hooks-global" class="settings-toggle-btn">Global</button>
          </div>
          <p class="settings-hint-small" id="settings-hooks-hint">Writes to .claude/settings.local.json in each workspace</p>
        </div>
      </div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
